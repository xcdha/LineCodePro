name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci-checks:
    name: CI checks (test + lint + debug APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Run lint
        run: ./gradlew :app:lintDebug

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Build user-cert debug APK
        run: ./gradlew :app:assembleDebugUserCert

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload user-cert debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-user-cert
          path: app/build/outputs/apk/debugUserCert/export/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload lint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: warn
          retention-days: 14

